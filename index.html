<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0d12">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>择日学习</title>
<style>
:root{
  --bg:#0c0d12; --bg-soft:#12131b; --card:#14161f; --card2:#191c27;
  --gold:#c9a45c; --gold-br:#e6cd8e; --gold-dim:#8a7441;
  --ink:#e9e0cd; --ink2:#9c927c; --ink3:#6d6555;
  --line:rgba(201,164,92,.20); --line-br:rgba(230,205,142,.55);
  --red:#b0655a; --amber:#c99a4e; --green:#7d9a66;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Serif SC",serif;
  color:var(--ink);line-height:1.7;overflow:hidden;position:fixed;width:100%;
  background:var(--bg);
  background-image:
    radial-gradient(120% 60% at 50% -8%, rgba(201,164,92,.14), transparent 60%),
    radial-gradient(90% 50% at 50% 108%, rgba(201,164,92,.07), transparent 55%),
    radial-gradient(1px 1px at 18% 22%, rgba(230,205,142,.55), transparent),
    radial-gradient(1px 1px at 72% 15%, rgba(230,205,142,.40), transparent),
    radial-gradient(1px 1px at 86% 40%, rgba(230,205,142,.30), transparent),
    radial-gradient(1px 1px at 32% 62%, rgba(230,205,142,.25), transparent),
    radial-gradient(1px 1px at 60% 82%, rgba(230,205,142,.30), transparent),
    radial-gradient(1px 1px at 12% 88%, rgba(230,205,142,.22), transparent);
}
.top{
  height:calc(58px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:20;flex:none;gap:1px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(12,13,18,.4),transparent);
}
.top .zh{font-size:19px;letter-spacing:8px;font-weight:600;color:var(--gold-br);
  text-indent:8px;text-shadow:0 0 18px rgba(201,164,92,.35)}
.top .en{font-size:9.5px;letter-spacing:5px;color:var(--ink3);text-indent:5px}
.top::before,.top::after{content:"";position:absolute;top:calc(50% + env(safe-area-inset-top)/2);
  width:26px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.top::before{left:26px}
.top::after{right:26px;transform:scaleX(-1)}
#app{position:absolute;top:calc(58px + env(safe-area-inset-top));
  bottom:calc(60px + env(safe-area-inset-bottom));left:0;right:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.view{display:none;padding:18px 16px 34px;animation:fade .35s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.search{position:relative;margin-bottom:20px}
.search input{
  width:100%;padding:13px 16px 13px 42px;border:1px solid var(--line);border-radius:14px;
  background:var(--card);font-size:15px;color:var(--ink);font-family:inherit;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.02)}
.search input::placeholder{color:var(--ink3)}
.search input:focus{outline:none;border-color:var(--line-br);
  box-shadow:0 0 0 3px rgba(201,164,92,.08)}
.search .si{position:absolute;left:15px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;opacity:.6}
.sec{display:flex;align-items:center;gap:12px;margin:2px 2px 16px}
.sec .t{font-size:13px;letter-spacing:3px;color:var(--gold);white-space:nowrap}
.sec .l{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.catcard{
  position:relative;background:linear-gradient(158deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:16px;padding:20px 15px 16px;
  cursor:pointer;transition:transform .15s,border-color .2s,box-shadow .2s;
  box-shadow:0 6px 20px rgba(0,0,0,.35);overflow:hidden}
.catcard::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;
  background:linear-gradient(158deg,rgba(230,205,142,.35),transparent 42%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;opacity:.7;pointer-events:none}
.catcard:active{transform:scale(.975);border-color:var(--line-br);
  box-shadow:0 0 24px rgba(201,164,92,.18)}
.catcard .ord{width:34px;height:34px;border-radius:50%;border:1px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--gold-br);
  background:radial-gradient(circle,rgba(201,164,92,.14),transparent);margin-bottom:12px}
.catcard .nm{font-weight:600;font-size:17px;color:var(--gold-br);letter-spacing:2px}
.catcard .ds{font-size:11px;color:var(--ink2);margin-top:5px;line-height:1.6;letter-spacing:.3px}
.catcard .ct{position:absolute;top:16px;right:15px;font-size:12px;color:var(--gold-dim);
  font-variant-numeric:tabular-nums;letter-spacing:1px}
.crumb{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.crumb .back{display:inline-flex;align-items:center;gap:5px;color:var(--gold);
  font-size:14px;cursor:pointer;padding:4px 2px;letter-spacing:1px}
.crumb .ttl{font-size:16px;color:var(--gold-br);letter-spacing:3px;font-weight:600}
.item{position:relative;background:linear-gradient(158deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px;
  cursor:pointer;transition:transform .12s,border-color .2s;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.item:active{transform:scale(.99);border-color:var(--line-br)}
.item .t{font-weight:600;font-size:16px;color:var(--ink);display:flex;align-items:center;
  gap:9px;letter-spacing:1px}
.item .t .nmtxt{flex:1}
.item .t::after{content:"›";color:var(--gold-dim);font-size:20px;font-weight:400}
.lvl{font-size:10px;padding:2px 8px;border-radius:20px;flex:none;letter-spacing:1px;
  border:1px solid;font-weight:400}
.lvl1{color:var(--green);border-color:rgba(125,154,102,.5)}
.lvl2{color:var(--amber);border-color:rgba(201,154,78,.5)}
.lvl3{color:var(--red);border-color:rgba(176,101,90,.5)}
.tags{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;color:var(--ink2);border:1px solid var(--line);border-radius:8px;
  padding:2px 9px;letter-spacing:.5px}
.empty{text-align:center;color:var(--ink3);padding:50px 0;font-size:14px;line-height:2;letter-spacing:1px}
.detail .dt{font-size:23px;font-weight:700;color:var(--gold-br);letter-spacing:2px;
  margin-bottom:8px;text-shadow:0 0 20px rgba(201,164,92,.2)}
.detail .meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink3);
  margin-bottom:18px;letter-spacing:1px;flex-wrap:wrap}
.detail .meta .dot{width:3px;height:3px;border-radius:50%;background:var(--gold-dim)}
.detail .body{background:linear-gradient(160deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:16px;padding:20px 18px;white-space:pre-wrap;
  font-size:15.5px;line-height:2;color:var(--ink);box-shadow:0 6px 20px rgba(0,0,0,.35);
  letter-spacing:.4px;white-space:normal}
.chips{display:flex;gap:9px;margin-bottom:20px;flex-wrap:wrap}
.chip{font-size:13px;padding:7px 15px;border-radius:22px;border:1px solid var(--line);
  color:var(--ink2);cursor:pointer;letter-spacing:1px;transition:.2s}
.chip.on{border-color:var(--gold);color:var(--gold-br);
  background:radial-gradient(circle,rgba(201,164,92,.12),transparent);
  box-shadow:0 0 16px rgba(201,164,92,.12)}
.chip .n{color:var(--gold-dim);margin-left:3px}
.pbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.pbar .lab{font-size:12px;color:var(--ink3);letter-spacing:2px;white-space:nowrap}
.pbar .track{flex:1;height:2px;background:var(--line);border-radius:2px;overflow:hidden}
.pbar .fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-br));
  transition:width .3s}
.flash{position:relative;background:linear-gradient(160deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:20px;min-height:360px;padding:26px 22px;
  display:flex;flex-direction:column;cursor:pointer;user-select:none;
  box-shadow:0 10px 34px rgba(0,0,0,.45);overflow:hidden}
.flash::before{content:"";position:absolute;inset:0;border-radius:20px;padding:1px;
  background:linear-gradient(160deg,rgba(230,205,142,.4),transparent 45%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.flash .fc-cat{font-size:12px;color:var(--gold);letter-spacing:3px;margin-bottom:auto}
.flash .fc-q{font-size:26px;font-weight:700;text-align:center;margin:auto 0;
  color:var(--gold-br);letter-spacing:3px;line-height:1.5;
  text-shadow:0 0 22px rgba(201,164,92,.25)}
.flash .fc-a{white-space:pre-wrap;font-size:15px;line-height:1.95;color:var(--ink);
  margin-top:10px;overflow-y:auto;letter-spacing:.4px}
.flash .hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;
  font-size:12px;color:var(--ink3);letter-spacing:2px}
.grade{display:flex;gap:11px;margin-top:16px}
.gbtn{flex:1;padding:13px 0;border-radius:13px;border:1px solid;font-size:15px;
  font-family:inherit;cursor:pointer;background:transparent;letter-spacing:2px;transition:.15s}
.gbtn small{display:block;font-size:10px;letter-spacing:1px;opacity:.7;margin-top:2px}
.gbtn:active{transform:scale(.96)}
.g-again{color:var(--red);border-color:rgba(176,101,90,.5)}
.g-hard{color:var(--amber);border-color:rgba(201,154,78,.5)}
.g-good{color:var(--green);border-color:rgba(125,154,102,.6)}
.done{text-align:center;padding:60px 20px}
.done .sym{font-size:30px;color:var(--gold-br);letter-spacing:6px;text-shadow:0 0 24px rgba(201,164,92,.4)}
.done .msg{font-size:18px;margin-top:18px;color:var(--gold-br);font-weight:600;letter-spacing:3px}
.done .sub{font-size:13px;color:var(--ink2);margin-top:12px;line-height:2;letter-spacing:1px}
.done button{margin-top:24px;padding:11px 28px;border-radius:13px;border:1px solid var(--gold-dim);
  background:transparent;color:var(--gold);font-size:14px;font-family:inherit;cursor:pointer;letter-spacing:2px}
.nav{position:absolute;bottom:0;left:0;right:0;
  height:calc(60px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
  display:flex;z-index:20;border-top:1px solid var(--line);
  background:linear-gradient(0deg,var(--bg),rgba(12,13,18,.7));backdrop-filter:blur(8px)}
.nav div{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;color:var(--ink3);font-size:11px;letter-spacing:4px;cursor:pointer;transition:.2s}
.nav div .ni{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5}
.nav div.on{color:var(--gold-br)}
.nav div.on .ni{opacity:1;box-shadow:0 0 10px var(--gold-br)}
/* ===== 速查（算） ===== */
.subtab{display:flex;gap:9px;margin-bottom:18px}
.subtab .st{flex:1;text-align:center;padding:9px 0;border-radius:12px;border:1px solid var(--line);
  color:var(--ink2);font-size:14px;letter-spacing:2px;cursor:pointer;transition:.2s}
.subtab .st.on{border-color:var(--gold);color:var(--gold-br);
  background:radial-gradient(circle,rgba(201,164,92,.12),transparent);box-shadow:0 0 16px rgba(201,164,92,.1)}
.pick-lab{font-size:12px;color:var(--gold);letter-spacing:3px;margin:0 2px 10px}
.grid-g{display:grid;gap:7px;margin-bottom:18px}
.g24{grid-template-columns:repeat(6,1fr)}
.g12{grid-template-columns:repeat(6,1fr)}
.g10{grid-template-columns:repeat(5,1fr)}
.gcell{text-align:center;padding:11px 0;border-radius:10px;border:1px solid var(--line);
  color:var(--ink);font-size:16px;cursor:pointer;transition:.15s;background:var(--card)}
.gcell:active{transform:scale(.94)}
.gcell.on{border-color:var(--gold-br);color:var(--gold-br);
  background:radial-gradient(circle,rgba(201,164,92,.18),transparent);box-shadow:0 0 14px rgba(201,164,92,.15)}
.res{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);
  border-radius:16px;padding:6px 18px 14px;box-shadow:0 6px 20px rgba(0,0,0,.35)}
.res .rrow{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);align-items:baseline}
.res .rrow:last-child{border-bottom:none}
.res .rk{flex:none;width:78px;font-size:13px;color:var(--gold);letter-spacing:1px;line-height:1.7}
.res .rv{flex:1;font-size:15px;color:var(--ink);line-height:1.75;letter-spacing:.5px}
.res .rv b{color:var(--gold-br);font-weight:600}
.res .rv .warn{color:var(--red)}
.res .rv small{color:var(--ink3);font-size:12px}
.res-hint{text-align:center;color:var(--ink3);padding:36px 0;font-size:13px;letter-spacing:2px;line-height:2}
.calc-note{font-size:11px;color:var(--ink3);text-align:center;margin-top:16px;line-height:1.8;letter-spacing:.5px}
/* ===== 收藏 / 常用 ===== */
.dtop{display:flex;align-items:flex-start;gap:12px;justify-content:space-between;margin-bottom:8px}
.dtop .dt{flex:1;margin-bottom:0}
.dacts{display:flex;gap:16px;align-items:center;padding-top:6px;flex:none}
.dacts .ic{cursor:pointer;font-size:21px;color:var(--ink3);transition:.2s;user-select:none;line-height:1}
.dacts .ic.txt{font-size:13px;letter-spacing:1px}
.dacts .ic:active{transform:scale(.9)}
.dacts .ic.on{color:var(--gold-br);text-shadow:0 0 14px rgba(201,164,92,.5)}
/* ===== 详情正文排版 ===== */
.body .bh{color:var(--gold-br);font-weight:600;font-size:15px;letter-spacing:1px;
  margin:17px 0 7px;padding-left:11px;border-left:2px solid var(--gold-dim)}
.body .bh:first-child{margin-top:0}
.body .bl{padding-left:15px;text-indent:-15px;margin:3px 0}
.body .bp{margin:3px 0}
.body .sp{height:7px}
/* ===== 学习统计 / 重置 ===== */
.lstat{display:flex;gap:15px;justify-content:center;font-size:12px;color:var(--ink2);
  letter-spacing:1px;margin-bottom:16px}
.lstat b{color:var(--gold-br);font-weight:600}
.reset{margin-top:18px;font-size:12px;color:var(--ink3);letter-spacing:1px;cursor:pointer;
  text-decoration:underline;text-underline-offset:3px}
/* ===== toast ===== */
#toast{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(10px);background:rgba(20,22,31,.96);
  border:1px solid var(--line-br);color:var(--gold-br);padding:9px 20px;border-radius:20px;
  font-size:13px;letter-spacing:1px;opacity:0;pointer-events:none;transition:.25s;z-index:50;
  box-shadow:0 6px 22px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ===== 学·测验 ===== */
.qcard{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);
  border-radius:20px;padding:22px 20px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.qtype{font-size:12px;color:var(--gold);letter-spacing:2px;margin-bottom:14px}
.qstem{font-size:16.5px;line-height:1.9;color:var(--ink);letter-spacing:.5px}
.qstem b{color:var(--gold-br);font-size:20px;font-weight:700}
.qask{display:block;margin-top:12px;font-size:14px;color:var(--ink2);letter-spacing:1px}
.qopts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.qopt{text-align:left;padding:14px 16px;border-radius:13px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);font-size:15.5px;font-family:inherit;cursor:pointer;
  letter-spacing:.5px;transition:.15s;line-height:1.6}
.qopt:active{transform:scale(.99)}
.qopt.right{border-color:var(--green);color:var(--green);
  background:radial-gradient(circle,rgba(125,154,102,.15),transparent)}
.qopt.wrong{border-color:var(--red);color:var(--red);
  background:radial-gradient(circle,rgba(176,101,90,.15),transparent)}
.qfb{margin-top:16px;padding:12px 15px;border-radius:12px;font-size:14px;letter-spacing:.5px;line-height:1.7}
.qfb.ok{color:var(--green);border:1px solid rgba(125,154,102,.4)}
.qfb.no{color:var(--red);border:1px solid rgba(176,101,90,.4)}
.qfb .qmore{color:var(--gold);cursor:pointer;margin-left:6px;letter-spacing:1px}
.qnext{width:100%;margin-top:13px;padding:14px 0;border-radius:13px;border:1px solid var(--gold-dim);
  background:transparent;color:var(--gold-br);font-size:15px;font-family:inherit;cursor:pointer;letter-spacing:3px}
.qnext:active{transform:scale(.98)}
.qscore{text-align:center;font-size:13px;color:var(--ink2);letter-spacing:1px;margin-bottom:16px}
.qscore b{color:var(--gold-br);font-weight:600}
/* ===== 排盘 / 女命 输入 ===== */
.ripan .rg{margin-bottom:16px}
.ripan .rg-lab{font-size:12px;color:var(--gold);letter-spacing:2px;margin:0 2px 8px}
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pcol{display:flex;flex-direction:column;gap:6px}
.pcol .ph{text-align:center;font-size:11px;color:var(--ink3);letter-spacing:1px}
.zsel{width:100%;padding:10px 4px;border-radius:10px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);font-size:16px;font-family:inherit;text-align:center;
  text-align-last:center;-webkit-appearance:none;appearance:none;cursor:pointer}
.zsel:focus{outline:none;border-color:var(--line-br)}
.zrow{display:flex;gap:8px;flex-wrap:wrap}
.zrow .zsel{flex:1;min-width:64px}
.rpbtn{width:100%;margin:4px 0 6px;padding:14px 0;border-radius:13px;border:1px solid var(--gold-dim);
  background:radial-gradient(circle,rgba(201,164,92,.12),transparent);color:var(--gold-br);
  font-size:15px;font-family:inherit;cursor:pointer;letter-spacing:4px}
.rpbtn:active{transform:scale(.98)}
.flag{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);align-items:baseline}
.flag:last-child{border-bottom:none}
.flag .fi{flex:none;width:20px;font-size:15px;text-align:center}
.flag .ft{flex:1;font-size:14.5px;line-height:1.7;color:var(--ink);letter-spacing:.3px}
.flag.bad .ft b{color:var(--red)}
.flag.good .ft b{color:var(--green)}
.flag.warn .ft b{color:var(--amber)}
.flag .ft small{color:var(--ink3);font-size:12px}
.allclear{text-align:center;color:var(--green);padding:16px 0;font-size:15px;letter-spacing:1px}
/* ===== 关联跳转 ===== */
.xlink{color:var(--gold-br);border-bottom:1px dashed var(--gold-dim);cursor:pointer}
/* ===== 字号调节 ===== */
.fontctl{display:flex;align-items:center;gap:2px;margin-left:auto}
.fontctl .fb{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
  background:var(--card);color:var(--gold);font-size:13px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;font-family:inherit}
.fontctl .fb:active{transform:scale(.9)}
/* ===== 填空输入 ===== */
.qinput{width:100%;margin-top:16px;padding:14px 16px;border-radius:13px;border:1px solid var(--line);
  background:var(--card);color:var(--gold-br);font-size:18px;font-family:inherit;text-align:center;
  letter-spacing:4px}
.qinput:focus{outline:none;border-color:var(--line-br);box-shadow:0 0 0 3px rgba(201,164,92,.08)}
.qsub{width:100%;margin-top:12px;padding:13px 0;border-radius:13px;border:1px solid var(--gold-dim);
  background:transparent;color:var(--gold-br);font-size:15px;font-family:inherit;cursor:pointer;letter-spacing:3px}
::-webkit-scrollbar{width:0;height:0}
.daily{margin:0 0 18px;padding:15px;border:1px solid var(--line-br);border-radius:16px;background:linear-gradient(145deg,var(--card),rgba(201,164,92,.06))}
.daily-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}.daily-h b{font-size:17px;color:var(--gold-br)}.daily-h span{font-size:11px;color:var(--ink3)}
.daily-topic{font-size:13px;color:var(--ink2);margin-bottom:10px}.daily-actions{display:grid;gap:7px}.daily-item{display:grid;grid-template-columns:36px 1fr;gap:7px}.daily-actions button{padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--ink);text-align:left;font-family:inherit}.daily-check{padding:0!important;text-align:center!important;font-size:17px!important;color:var(--ink3)!important}.daily-check.done{background:var(--gold)!important;border-color:var(--gold)!important;color:#111!important}.daily-go:after{content:'›';float:right;color:var(--gold-br);font-size:18px;line-height:12px}
</style>
</head>
<body>
<div class="top"><div class="zh">择日学习</div><div class="en">Z E R I</div></div>
<div id="app">
  <div class="view on" id="v-home">
    <div class="daily" id="daily"></div>
    <div class="search">
      <svg class="si" viewBox="0 0 24 24" fill="none" stroke="#c9a45c" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" placeholder="搜索  嫁娶 · 戊己都天 · 三煞" autocomplete="off">
    </div>
    <div id="fav-wrap"></div>
    <div class="sec"><span class="t" id="sec-t">六 类 择 要</span><span class="l"></span></div>
    <div class="cats" id="cats"></div>
  </div>
  <div class="view" id="v-list">
    <div class="crumb"><span class="back" onclick="history.back()">‹ 返回</span><span class="ttl" id="list-title"></span></div>
    <div id="list"></div>
  </div>
  <div class="view" id="v-detail">
    <div class="crumb"><span class="back" id="d-back" onclick="history.back()">‹ 返回</span></div>
    <div class="detail" id="detail"></div>
  </div>
  <div class="view" id="v-learn">
    <div class="subtab" id="learn-mode"></div>
    <div id="learn-know">
      <div class="lstat" id="learn-stat"></div>
      <div class="chips" id="learn-chips"></div>
      <div id="learn-body"></div>
    </div>
    <div id="learn-calc-q" style="display:none">
      <div class="chips" id="qc-chips"></div>
      <div id="qc-body"></div>
    </div>
  </div>
  <div class="view" id="v-calc">
    <div class="subtab" id="calc-sub"></div>
    <div id="calc-body"></div>
  </div>
</div>
<div class="nav">
  <div class="on" id="n-cha" onclick="tab('cha')"><span class="ni"></span>查</div>
  <div id="n-suan" onclick="tab('suan')"><span class="ni"></span>算</div>
  <div id="n-xue" onclick="tab('xue')"><span class="ni"></span>学</div>
</div>

<script src="data.js"></script>
<script>
const $=s=>document.querySelector(s);
const byId=id=>DATA.find(d=>d.id===id);
const catName=k=>(CATS.find(c=>c.key===k)||{}).name||k;
const ORD=['','壹','贰','叁','肆','伍','陆','柒','捌'];
const catOrd=k=>ORD[CATS.findIndex(c=>c.key===k)+1]||'';
const LV=['','入门','基础','进阶'];
function renderDaily(){
  const n=Math.floor(Date.now()/864e5),c=CATS[n%CATS.length],first=DATA.find(d=>d.cat===c.key);
  const key='zeri_daily_'+todayStr(),done=JSON.parse(localStorage.getItem(key)||'{}');
  const item=(id,label,action)=>`<div class="daily-item"><button class="daily-check ${done[id]?'done':''}" disabled aria-label="${done[id]?'系统已确认完成':'等待系统确认'}">${done[id]?'✓':'○'}</button><button class="daily-go" onclick="${action}">${label}</button></div>`;
  $('#daily').innerHTML=`<div class="daily-h"><b>今日学习清单</b><span>约 5–10 分钟</span></div>
    <div class="daily-topic">今日主题：${c.name} · ${c.desc}</div>
    <div class="daily-actions">
      ${item('read',`① 精读：${first.title}`,`openDetail('${first.id}')`)}
      ${item('quiz',`② 做 3 道${c.name}知识题`,`dailyLearn('${c.key}')`)}
      ${item('review','③ 回看 1 道错题 / 速查题','dailyWrong()')}
    </div>`;
}
function markDailyAuto(id){const key='zeri_daily_'+todayStr(),done=JSON.parse(localStorage.getItem(key)||'{}');if(id==='quiz')done.quizCount=(done.quizCount||0)+1;if(id!=='quiz'||done.quizCount>=3)done[id]=true;localStorage.setItem(key,JSON.stringify(done));renderDaily();}
function dailyLearn(k){curCat=k;lmode='know';enterLearn();goState({v:'learn'});}
var dailyReviewActive=false;
function dailyWrong(){dailyReviewActive=true;curCat=WRONG.size?'__wrong__':'all';lmode=WRONG.size?'know':'calc';enterLearn();goState({v:'learn'});}
/* ===== 视图路由（支持安卓返回键 / 浏览器后退） ===== */
const _viewScroll={};
let _viewState={v:'home'};
try{history.scrollRestoration='manual'}catch(e){}
function _viewKey(s){return s.v+(s.cat?':'+s.cat:'')+(s.id?':'+s.id:'')}
function _restoreViewScroll(s){
  const y=_viewScroll[_viewKey(s)]||0,app=$('#app'),restore=()=>{app.scrollTop=y};
  restore();requestAnimationFrame(()=>{restore();requestAnimationFrame(restore)});
}
function show(s){
  s=s||{v:'home'};
  const app=$('#app');if(app)_viewScroll[_viewKey(_viewState)]=app.scrollTop;
  ['home','list','detail','learn','calc'].forEach(v=>{const el=$('#v-'+v);if(el)el.classList.remove('on');});
  const isXue=s.v==='learn',isSuan=s.v==='calc';
  $('#n-cha').classList.toggle('on',!isXue&&!isSuan);
  $('#n-suan').classList.toggle('on',isSuan);
  $('#n-xue').classList.toggle('on',isXue);
  if(s.v==='list'){$('#list-title').textContent=catName(s.cat);
    $('#list').innerHTML=DATA.filter(d=>d.cat===s.cat).map(itemHTML).join('');
    $('#v-list').classList.add('on');}
  else if(s.v==='detail'){renderDetail(s.id);$('#v-detail').classList.add('on');}
  else if(s.v==='learn'){$('#v-learn').classList.add('on');}
  else if(s.v==='calc'){initCalc();$('#v-calc').classList.add('on');}
  else{if(!$('#q').value.trim())renderFavs();$('#v-home').classList.add('on');}
  _viewState=s;_restoreViewScroll(s);
}
function goState(s){show(s);history.pushState(s,'');}
window.addEventListener('popstate',e=>show(e.state||{v:'home'}));
function tab(t){
  if(t==='cha'){$('#q').value='';$('#sec-t').textContent='六 类 择 要';renderFavs();renderCats();goState({v:'home'});}
  else if(t==='suan'){goState({v:'calc'});}
  else{enterLearn();goState({v:'learn'});}
}

function renderCats(){
  $('#cats').className='cats';
  $('#cats').innerHTML=CATS.map(c=>{
    const n=DATA.filter(d=>d.cat===c.key).length;
    return `<div class="catcard" onclick="openCat('${c.key}')">
      <span class="ct">${n} 条</span>
      <div class="ord">${catOrd(c.key)}</div>
      <div class="nm">${c.name}</div><div class="ds">${c.desc}</div></div>`;
  }).join('');
}

function itemHTML(d){
  return `<div class="item" onclick="openDetail('${d.id}')">
    <div class="t"><span class="lvl lvl${d.level}">${LV[d.level]}</span><span class="nmtxt">${d.title}</span></div>
    <div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`;
}
function openCat(k){goState({v:'list',cat:k});}

/* ===== 收藏 / 常用 ===== */
var FKEY='zeri_fav_v1';
var FAV=JSON.parse(localStorage.getItem(FKEY)||'[]');
function isFav(id){return FAV.includes(id);}
function saveFav(){localStorage.setItem(FKEY,JSON.stringify(FAV));}
function toggleFav(id){const i=FAV.indexOf(id);if(i<0)FAV.unshift(id);else FAV.splice(i,1);saveFav();}
function favDetail(id){toggleFav(id);renderDetail(id);}
function renderFavs(){
  const w=$('#fav-wrap');if(!w)return;w.style.display='';
  const items=FAV.map(byId).filter(Boolean);
  w.innerHTML=items.length
    ?`<div class="sec"><span class="t">常 用 收 藏</span><span class="l"></span></div>${items.map(itemHTML).join('')}`
    :'';
}
/* ===== toast / 复制 ===== */
function toast(m){let t=$('#toast');if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=m;t.className='show';clearTimeout(t._h);t._h=setTimeout(()=>t.className='',1400);}
function copyDetail(id){const d=byId(id);const txt=d.title+'\n\n'+d.body+'\n\n——《择日合集》P'+d.pages;
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast('已复制')).catch(()=>toast('复制失败'));
  else toast('浏览器不支持复制');}
/* ===== 关联跳转：正文中的术语链接到对应知识点 ===== */
const LINKS=[['戊己都天','sx-12'],['回头贡煞','sx-06'],['真三煞','sx-05'],['三煞','sx-04'],
  ['岁破','sx-03'],['阴府','ss-08'],['补龙','ff-07'],['洪范','sc-03'],['天乙贵人','sc-01'],
  ['贵人登天时','sc-08'],['驿马','sc-02'],['二十四山','jc-07'],['五虎遁','jc-08'],['五鼠遁','jc-08'],
  ['十二建星','ss-04'],['二十八宿','ss-09'],['十二黄道','ss-07'],['四离四绝','ss-06'],['麟星','sc-10'],
  ['相主','ff-06'],['禄马贵','sc-07'],['真太阳时','sc-04']].sort((a,b)=>b[0].length-a[0].length);
function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
const LINK_RE=new RegExp(LINKS.map(x=>esc(x[0])).join('|'),'g');
const LINK_ID=Object.fromEntries(LINKS);
function linkTerms(text,curId){
  const seen=new Set();
  return text.replace(LINK_RE,m=>{
    const id=LINK_ID[m];
    if(id===curId||seen.has(m))return m;
    seen.add(m);
    return `<span class="xlink" onclick="openDetail('${id}')">${m}</span>`;
  });
}
/* ===== 详情正文排版：【】小标题 · 项目符号 · 术语链接 ===== */
function fmtBody(body,curId){
  return body.split('\n').map(line=>{
    const t=line.trim();
    if(!t)return '<div class="sp"></div>';
    const h=linkTerms(t,curId);
    if(/^【.+?】/.test(t))return `<div class="bh">${h}</div>`;
    if(/^[•·]/.test(t)||/^[①②③④⑤⑥⑦⑧⑨⑩⑪⑫]/.test(t))return `<div class="bl">${h}</div>`;
    return `<div class="bp">${h}</div>`;
  }).join('');
}
/* ===== 字号调节 ===== */
var fontScale=parseFloat(localStorage.getItem('zeri_font'))||1;
function setFont(dir){fontScale=Math.min(1.4,Math.max(0.85,+(fontScale+dir*0.12).toFixed(2)));
  localStorage.setItem('zeri_font',fontScale);applyFont();}
function applyFont(){const b=document.querySelector('#detail .body');if(b)b.style.fontSize=(15.5*fontScale).toFixed(1)+'px';}

/* 别名 + 拼音映射：口语词/拼音 → 教材正名 */
const ALIAS={
  '嫁娶':['结婚','婚嫁','婚姻','娶亲','出嫁','完婚','六神论','十神','麒麟','麟星','jiaqu','hunjia','jiehun'],
  '移徙':['搬家','乔迁','迁居','入伙','banjia','yixi','qianju'],
  '入宅归火':['入宅','安神位','进宅','ruzhai'],
  '造宅':['建房','盖房','起造','建造','修房','造屋','zaozhai','jianfang','gaifang'],
  '动土':['破土','挖土','开工','兴工','dongtu','potu'],
  '开市':['开业','开张','营业','开工','kaishi','kaiye','kaizhang'],
  '安葬':['下葬','葬礼','丧葬','埋葬','出殡','入殓','anzang','zangli','xiazang'],
  '安床':['安床','放床','ancuang','anchuang'],
  '安门':['安门','装门','开门','门楼','anmen'],
  '起基定磉':['起基','定磉','行墙','qiji'],
  '竖柱上梁':['上梁','立柱','封顶','shangliang','shuzhu'],
  '出行':['出门','远行','旅行','赴任','chuxing','yuanxing'],
  '祈福':['祈福','还愿','qifu'],
  '祭祀':['祭祀','祭祖','扫墓','jisi'],
  '三煞':['三杀','劫煞','灾煞','岁煞','sansha'],
  '戊己都天':['都天','五虎煞','wujidoutian','dutian','dutiansha'],
  '岁破':['冲太岁','太岁','suipo','taisui'],
  '天乙贵人':['贵人','天乙','guiren','tianyi'],
  '驿马':['马星','禄马','yima','maxing','luma'],
  '真太阳时':['太阳时','真太阳','平太阳','taiyangshi','zhentaiyang'],
  '二十四山':['坐山','廿四山','ershisishan','zuoshan'],
  '十二黄道':['黄道','黄道吉日','青龙','明堂','天德','玉堂','huangdao'],
  '阴府':['阴府煞','正阴府','傍阴府','yinfu'],
  '二十八宿':['星宿','廿八宿','ershibaxiu','xingxiu'],
  '补龙':['补龙','扶山','bulong','fushan'],
  '斗首':['斗首','六山','doushou','liushan'],
  '奇门':['奇门遁甲','遁甲','起局','qimen','dunjia'],
  '五虎遁':['五虎遁','五鼠遁','排月柱','排时柱','wuhudun','wushudun'],
  '洪范':['洪范五行','库音','山运','hongfan','kuyin'],
  '贵人登天时':['登天时','贵登天','dengtianshi'],
  '回头贡煞':['回头贡煞','贡煞','huitou'],
  '四离四绝':['四离','四绝','sili','sijue'],
};
function expandKw(kw){
  const low=kw.toLowerCase();const terms=new Set();
  for(const canon in ALIAS){
    if(canon.includes(kw)){terms.add(canon);continue;}
    if(ALIAS[canon].some(a=>{const al=a.toLowerCase();
      return al===low||(low.length>=2&&al.startsWith(low))||(low.length>=2&&al.includes(low));})){terms.add(canon);}
  }
  return [...terms];
}
$('#q').addEventListener('input',e=>{
  const kw=e.target.value.trim();
  const fw=$('#fav-wrap');if(fw)fw.style.display=kw?'none':'';
  if(!kw){$('#sec-t').textContent='六 类 择 要';renderFavs();renderCats();return;}
  const extra=expandKw(kw);
  const r=DATA.filter(d=>{
    const hay=d.title+d.body+d.tags.join('')+catName(d.cat);
    return hay.includes(kw)||extra.some(t=>hay.includes(t));
  });
  $('#sec-t').textContent='命 中 '+r.length+' 条';
  const box=$('#cats');box.className='';   // 搜索结果用列表排版
  box.innerHTML=r.length?r.map(itemHTML).join(''):'<div class="empty">未找到相关知识点<br>试试：嫁娶 · 三煞 · dongtu</div>';
});

function renderDetail(id){
  const d=byId(id);
  $('#detail').innerHTML=`
    <div class="dtop">
      <div class="dt">${d.title}</div>
      <div class="dacts">
        <span class="fontctl"><span class="fb" onclick="setFont(-1)">A-</span><span class="fb" onclick="setFont(1)">A+</span></span>
        <span class="ic star ${isFav(id)?'on':''}" onclick="favDetail('${id}')">${isFav(id)?'★':'☆'}</span>
        <span class="ic txt" onclick="copyDetail('${id}')">复制</span>
      </div>
    </div>
    <div class="meta"><span class="lvl lvl${d.level}">${LV[d.level]}</span>
      <span>${catName(d.cat)}</span><span class="dot"></span><span>教材 P${d.pages}</span></div>
    <div class="body">${fmtBody(d.body,id)}</div>
    <div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  applyFont();
}
function openDetail(id){const n=Math.floor(Date.now()/864e5),c=CATS[n%CATS.length],first=DATA.find(d=>d.cat===c.key);goState({v:'detail',id});if(first&&first.id===id)setTimeout(()=>{if(_viewState&&_viewState.v==='detail'&&_viewState.id===id)markDailyAuto('read')},8000);}

/* ===== 学习：翻卡 + 轻量SRS ===== */
var SKEY='zeri_srs_v1';
var srs=JSON.parse(localStorage.getItem(SKEY)||'{}');
var curCat='all', queue=[], idx=0, flipped=false;
/* 错题本 */
var WKEY='zeri_wrong_v1';var WRONG=new Set(JSON.parse(localStorage.getItem(WKEY)||'[]'));
function saveWrong(){localStorage.setItem(WKEY,JSON.stringify([...WRONG]));}
/* 每日打卡 */
var STKEY='zeri_streak_v1';var streak=JSON.parse(localStorage.getItem(STKEY)||'{"last":"","days":0}');
function todayStr(t=new Date()){return t.getFullYear()+'-'+(t.getMonth()+1)+'-'+t.getDate();}
function markStudied(){
  const t=todayStr();if(streak.last===t)return;
  const ys=todayStr(new Date(Date.now()-864e5));
  streak.days=(streak.last===ys)?streak.days+1:1;streak.last=t;
  localStorage.setItem(STKEY,JSON.stringify(streak));renderStat();
}
function saveSrs(){localStorage.setItem(SKEY,JSON.stringify(srs));}
function isDue(d){const s=srs[d.id];return !s||!s.due||s.due<=Date.now();}
function renderChips(){
  const chips=[{k:'all',n:'全部'}].concat(CATS.map(c=>({k:c.key,n:c.name})));
  let html=chips.map(c=>{
    const pool=c.k==='all'?DATA:DATA.filter(d=>d.cat===c.k);
    const due=pool.filter(isDue).length;
    return `<div class="chip ${c.k===curCat?'on':''}" onclick="pickCat('${c.k}')">${c.n}${due?`<span class="n">${due}</span>`:''}</div>`;
  }).join('');
  if(WRONG.size)html+=`<div class="chip ${curCat==='__wrong__'?'on':''}" onclick="pickCat('__wrong__')" style="border-color:rgba(176,101,90,.6)">错题<span class="n" style="color:var(--red)">${WRONG.size}</span></div>`;
  $('#learn-chips').innerHTML=html;
}
function pickCat(k){curCat=k;buildQueue();renderChips();renderCard();}
function buildQueue(){
  let pool;
  if(curCat==='__wrong__'){pool=[...WRONG].map(byId).filter(Boolean);queue=pool;}   // 错题本：全列，不看到期
  else{pool=curCat==='all'?DATA:DATA.filter(d=>d.cat===curCat);queue=pool.filter(isDue);}
  queue.sort((a,b)=>(srs[a.id]?.due||0)-(srs[b.id]?.due||0));
  idx=0;flipped=false;
}
/* 知识题：给释义 → 选是哪个知识点（客观判分，驱动SRS） */
var quizState=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function qSnippet(d){
  let b=d.body.replace(/\s+/g,' ').trim();
  d.title.split(/[·・.]/).forEach(p=>{if(p.length>=2)b=b.split(p).join('○○');});
  b=b.split(d.title).join('○○');
  return b.slice(0,84);
}
function pickDistractors(d,n){
  const same=shuffle(DATA.filter(x=>x.cat===d.cat&&x.id!==d.id));
  const other=shuffle(DATA.filter(x=>x.cat!==d.cat&&x.id!==d.id));
  return same.concat(other).slice(0,n);
}
function renderCard(){
  const box=$('#learn-body');
  if(idx>=queue.length){
    box.innerHTML=`<div class="done"><div class="sym">✦ ✦ ✦</div>
      <div class="msg">此 组 已 毕</div>
      <div class="sub">${curCat==='all'?'全部':catName(curCat)} · 暂无到期题目<br>换个分类，或稍后再来温习</div>
      <button onclick="pickCat('all')">回到全部</button>
      <div class="reset" onclick="resetSrs()">重置全部学习进度</div></div>`;
    renderChips();renderStat();return;
  }
  const d=queue[idx];$('#app').scrollTop=0;
  const opts=shuffle([{t:d.title,ok:true},...pickDistractors(d,3).map(x=>({t:x.title,ok:false}))]);
  quizState={d,opts,answered:false};
  const pct=Math.round(idx/queue.length*100);
  box.innerHTML=`
    <div class="pbar"><span class="lab">${catOrd(d.cat)} ${catName(d.cat)}</span>
      <span class="track"><span class="fill" style="width:${pct}%"></span></span>
      <span class="lab">${idx+1}/${queue.length}</span></div>
    <div class="qcard">
      <div class="qtype">释义辨识 · ${catName(d.cat)} · ${LV[d.level]}</div>
      <div class="qstem">「${qSnippet(d)}…」<span class="qask">这段讲的是哪个知识点？</span></div>
      <div class="qopts" id="qopts">
        ${opts.map((o,i)=>`<button class="qopt" onclick="answerQuiz(${i})">${o.t}</button>`).join('')}
      </div>
      <div id="qfb"></div>

function answerQuiz(i){
  if(!quizState||quizState.answered)return;quizState.answered=true;
  document.querySelectorAll('#qopts .qopt').forEach((el,k)=>{el.disabled=true;
    if(quizState.opts[k].ok)el.classList.add('right');
    else if(k===i)el.classList.add('wrong');});
  const ok=quizState.opts[i].ok,d=quizState.d;
  markDailyAuto('quiz');if(dailyReviewActive||curCat==='__wrong__'){markDailyAuto('review');dailyReviewActive=false;}
  applyGrade(ok?2:0);markStudied();
  if(ok){if(WRONG.has(d.id)){WRONG.delete(d.id);saveWrong();}}
  else{WRONG.add(d.id);saveWrong();}
  renderChips();
  $('#qfb').innerHTML=`<div class="qfb ${ok?'ok':'no'}">${ok?'✓ 答对了，已加长复习间隔':'✗ 正确答案：'+d.title+'　（已入错题本）'}
      <span class="qmore" onclick="openDetail('${d.id}')">查看详情 ›</span></div>
    <button class="qnext" onclick="advance()">下一题 ›</button>`;

function advance(){idx++;renderCard();}
/* 间隔递增：再来→8分重来；有点难→缩短；记住了→按熟练度成倍拉长(4天→约9→约21…) */
function schedule(card,g){
  let ease=(card&&card.ease)||2.3, reps=(card&&card.reps)||0, pIvl=(card&&card.ivl)||0;
  const MIN=8/1440;
  if(g===0)return{reps:0,ease:Math.max(1.6,ease-0.2),ivl:MIN};
  if(g===1)return{reps:reps,ease:Math.max(1.7,ease-0.05),ivl:pIvl?Math.max(1,pIvl*0.6):1};
  const r=reps+1;
  return{reps:r,ease:Math.min(2.8,ease+0.03),ivl:r<=1?4:Math.max(4,pIvl)*ease};
}
function fmtIvl(iv){
  if(iv<1)return '&lt;'+Math.max(10,Math.round(iv*1440))+'分';
  if(iv<30)return Math.round(iv)+'天';
  return (Math.round(iv/30*10)/10)+'月';
}
function applyGrade(g){
  const d=queue[idx];const now=Date.now();
  const r=schedule(srs[d.id],g);
  srs[d.id]={due:now+r.ivl*864e5,last:now,g,reps:r.reps,ease:r.ease,ivl:r.ivl};saveSrs();
  if(g===0)queue.push(d);   // 答错的题本轮末尾再考一次
  renderStat();
}
function renderStat(){
  const el=$('#learn-stat');if(!el)return;
  let mastered=0,seen=0,due=0;
  DATA.forEach(d=>{const s=srs[d.id];if(s){seen++;if((s.ivl||0)>=21)mastered++;}if(isDue(d))due++;});
  el.innerHTML=`已掌握 <b>${mastered}</b> · 到期 <b>${due}</b> · 新 <b>${DATA.length-seen}</b> / ${DATA.length}${streak.days?`　·　🔥连续 <b>${streak.days}</b> 天`:''}`;
}
function resetSrs(){
  if(confirm('确定清空全部学习进度？（收藏不受影响）')){srs={};saveSrs();renderStat();curCat='all';buildQueue();renderChips();renderCard();}
}

const DUTIAN={甲:['辰','巳'],己:['辰','巳'],乙:['寅','卯'],庚:['寅','卯'],丙:['子','丑'],辛:['子','丑'],丁:['戌','亥'],壬:['戌','亥'],戊:['申','酉'],癸:['申','酉']};
const GONGSHA={未:['申','子','辰'],戌:['亥','卯','未'],丑:['寅','午','戌'],辰:['巳','酉','丑']};
const SANSHA_FANG={水:['巳','午','未'],火:['亥','子','丑'],金:['寅','卯','辰'],木:['申','酉','戌']};
var ripanState={yg:'',yz:'',mg:'',mz:'',dg:'',dz:'',hg:'',hz:'',shan:'',cg:'',cz:''};
function optG(c){return '<option value="">干</option>'+GAN.map(g=>`<option ${g===c?'selected':''}>${g}</option>`).join('');}

function ripanForm(){

  </div>`;

function analyzeRipan(){
  const out=$('#ripan-out');if(!out)return;const S=ripanState;
  const P=[['年',S.yg,S.yz],['月',S.mg,S.mz],['日',S.dg,S.dz],['时',S.hg,S.hz]];
  const zhis=P.filter(p=>p[2]).map(p=>[p[0],p[2]]),gans=P.filter(p=>p[1]).map(p=>[p[0],p[1]]);
  const F=[],shan=S.shan;
  if(shan){
    const sz=SHAN_ZHI[shan],gua=SHAN_GUA[shan],chong=ZHI[(ZHI.indexOf(sz)+6)%12];
    const brk={'年':'岁破','月':'月破','日':'日破','时':'时破'};
    zhis.forEach(([l,z])=>{if(z===chong)F.push(['bad',`<b>${brk[l]}</b>：${l}支 ${z} 冲坐山 ${shan}山，大凶`]);});
    const ss=sanshaYears(sz),ssz=ss.slice(0,3).split('');
    zhis.forEach(([l,z])=>{if(ssz.includes(z))F.push(['bad',`<b>山家三煞</b>：${l}支 ${z} 属${ss}，三煞占 ${shan}山方`]);});
    const yf=ZHENGYINFU[gua],hit=gans.filter(([l,g])=>yf.includes(g));
    if(hit.length)F.push([hit.length>=2?'bad':'warn',`<b>正阴府</b>：${shan}(${gua}卦)忌 ${yf.join('')}，日课见 ${hit.map(h=>h[0]+h[1]).join('、')}${hit.length>=2?'（双全·忌）':'（单干·可制化）'}`]);
    if(S.yg&&DUTIAN[S.yg]&&DUTIAN[S.yg].includes(sz))F.push(['warn',`<b>戊己都天</b>：${S.yg}年都天在 ${DUTIAN[S.yg].join('')}，坐山 ${shan}(${sz}) 犯，忌动土`]);
    gans.forEach(([l,g])=>{
      if(LU[g]===sz)F.push(['good',`<b>禄到山</b>：${l}干 ${g} 禄在 ${sz}，到坐山`]);
      if(YANGGUI[g]===sz||YINGUI[g]===sz)F.push(['good',`<b>贵人到山</b>：${l}干 ${g} 贵人到 ${sz}`]);});
    zhis.forEach(([l,z])=>{if(MA[z]===sz)F.push(['good',`<b>驿马到山</b>：${l}支 ${z} 马在 ${sz}，到坐山`]);});
  }
  const cz=S.cz;
  if(cz){
    if(GONGSHA[cz]){const need=GONGSHA[cz],have=zhis.map(z=>z[1]);
      if(need.every(n=>have.includes(n)))F.push(['bad',`<b>回头贡煞</b>：${cz}命忌课中 ${need.join('')} 三字全见，已犯`]);}
    const cfang=SANSHA_FANG[heJu(cz).e];
    zhis.forEach(([l,z])=>{if(cfang.includes(z))F.push(['warn',`<b>主命三煞</b>：${l}支 ${z} 为 ${cz}命三煞方，需贵人化`]);});
    const cchong=ZHI[(ZHI.indexOf(cz)+6)%12];
    zhis.forEach(([l,z])=>{
      if(z===cchong)F.push(['warn',`<b>命课相冲</b>：${l}支 ${z} 冲主命 ${cz}${l==='日'?'（日柱冲命，重）':''}`]);
      else if(LIUHE[cz]===z)F.push(['good',`<b>命课相合</b>：${l}支 ${z} 与主命 ${cz} 六合`]);
      else if(heJu(cz).arr.includes(z)&&z!==cz)F.push(['good',`<b>命课三合</b>：${l}支 ${z} 与主命 ${cz} 同 ${heJu(cz).e}局`]);});
  }
  if(!shan&&!cz&&!zhis.length&&!gans.length){out.innerHTML=hintBox('排入四柱、坐山、主事年命，自动分析');return;}
  if(!F.length){out.innerHTML='<div class="res"><div class="allclear">✦ 未见明显冲煞　可再核历日神煞</div></div>';return;}
  const ord={bad:0,warn:1,good:2},ico={bad:'✕',warn:'△',good:'✓'};
  F.sort((a,b)=>ord[a[0]]-ord[b[0]]);
  out.innerHTML='<div class="res">'+F.map(f=>`<div class="flag ${f[0]}"><div class="fi">${ico[f[0]]}</div><div class="ft">${f[1]}</div></div>`).join('')+'</div>';
}

function enterLearn(){
  renderLmode();
  if(lmode==='know'){renderStat();buildQueue();renderChips();renderCard();}
  else{renderQcChips();newCalcQ();}
}

/* ===== 速查题：用「算」的精确数据出计算题，即时判分 ===== */
var qcCat='随机',qcScore=0,qcTotal=0,qcAns=null,qcAnswered=false,qcMode='choice';
const QC_TYPES=['随机','禄','贵人','驿马','六合','六冲','三煞','岁破','阴府'];
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function optZhi(ans){return shuffle([ans,...shuffle(ZHI.filter(z=>z!==ans)).slice(0,3)]);}
function optFrom(all,ans){return shuffle([ans,...shuffle(all.filter(x=>x!==ans)).slice(0,3)]);}
function genQ(type){
  if(type==='随机')type=rnd(QC_TYPES.slice(1));
  if(type==='禄'){const g=rnd(GAN);return{stem:`【禄】<b>${g}</b> 日 / 命，禄在哪一支？`,ans:LU[g],opts:optZhi(LU[g])};}
  if(type==='贵人'){const g=rnd(GAN),yang=Math.random()<0.5,a=yang?YANGGUI[g]:YINGUI[g];
    return{stem:`【天乙贵人】<b>${g}</b> 日的${yang?'阳贵(昼)':'阴贵(夜)'}在哪一支？`,ans:a,opts:optZhi(a)};}
  if(type==='驿马'){const z=rnd(ZHI);return{stem:`【驿马】<b>${z}</b>（年 / 日支）三合取，马星在？`,ans:MA[z],opts:optZhi(MA[z])};}
  if(type==='六合'){const z=rnd(ZHI);return{stem:`【六合】<b>${z}</b> 与哪一支相合？`,ans:LIUHE[z],opts:optZhi(LIUHE[z])};}
  if(type==='六冲'){const z=rnd(ZHI),c=ZHI[(ZHI.indexOf(z)+6)%12];return{stem:`【六冲】<b>${z}</b> 冲哪一支？`,ans:c,opts:optZhi(c)};}
  if(type==='三煞'){const s=rnd(SHAN),y=sanshaYears(SHAN_ZHI[s]);
    return{stem:`【山家三煞】坐 <b>${s}山</b>，逢哪个三合局之年犯三煞？`,ans:y,opts:optFrom(['申子辰(水局)','寅午戌(火局)','巳酉丑(金局)','亥卯未(木局)'],y)};}
  if(type==='岁破'){const s=rnd(SHAN),z=SHAN_ZHI[s],c=ZHI[(ZHI.indexOf(z)+6)%12];
    return{stem:`【岁破】坐 <b>${s}山</b>（双山地支 ${z}），逢哪支之年为岁破？`,ans:c,opts:optZhi(c)};}
  const pool=SHAN.filter(x=>ZHENGYINFU[SHAN_GUA[x]].length===2),s=rnd(pool),gua=SHAN_GUA[s],a=ZHENGYINFU[gua].join('');
  return{stem:`【正阴府】坐 <b>${s}山</b>（${gua}卦），开山动土忌哪组天干？`,ans:a,opts:optFrom(['甲己','乙庚','丙辛','丁壬','戊癸'],a)};
}
function renderQcChips(){
  $('#qc-chips').innerHTML=QC_TYPES.map(t=>`<div class="chip ${t===qcCat?'on':''}" onclick="pickQc('${t}')">${t}</div>`).join('');
}
function pickQc(t){qcCat=t;renderQcChips();newCalcQ();}
function setQcMode(m){qcMode=m;newCalcQ();}
function newCalcQ(){
  qcAnswered=false;qcAns=genQ(qcCat);$('#app').scrollTop=0;
  const body=qcMode==='choice'
    ?`<div class="qopts" id="qcopts">${qcAns.opts.map(o=>`<button class="qopt" onclick="answerCalcQ('${o}')">${o}</button>`).join('')}</div>`
    :`<input class="qinput" id="qcin" placeholder="输入答案（地支 / 局 / 天干）" autocomplete="off">
      <button class="qsub" onclick="submitFill()">提 交</button>`;
  $('#qc-body').innerHTML=`
    <div class="subtab" style="margin-bottom:14px">
      <div class="st ${qcMode==='choice'?'on':''}" onclick="setQcMode('choice')">选择</div>
      <div class="st ${qcMode==='fill'?'on':''}" onclick="setQcMode('fill')">填空</div></div>
    <div class="qscore">本轮 <b>${qcScore}</b> / ${qcTotal} 正确</div>
    <div class="qcard">
      <div class="qtype">速查计算 · ${qcCat==='随机'?'随机':qcCat}</div>
      <div class="qstem">${qcAns.stem}</div>
      ${body}
      <div id="qcfb"></div>
    </div>`;
  if(qcMode==='fill'){const inp=$('#qcin');if(inp){try{inp.focus();}catch(e){}inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitFill();});}}
}
function qcFeedback(ok){
  $('#qcfb').innerHTML=`<div class="qfb ${ok?'ok':'no'}">${ok?'✓ 正确':'✗ 正确答案：'+qcAns.ans}</div>
    <button class="qnext" onclick="newCalcQ()">下一题 ›</button>`;
  const sc=$('#qc-body').querySelector('.qscore');if(sc)sc.innerHTML=`本轮 <b>${qcScore}</b> / ${qcTotal} 正确`;
}
function answerCalcQ(choice){
  if(qcAnswered)return;qcAnswered=true;qcTotal++;
  const ok=choice===qcAns.ans;if(ok)qcScore++;markStudied();if(dailyReviewActive){markDailyAuto('review');dailyReviewActive=false;}
  document.querySelectorAll('#qcopts .qopt').forEach(el=>{el.disabled=true;
    if(el.textContent===qcAns.ans)el.classList.add('right');
    else if(el.textContent===choice)el.classList.add('wrong');});
  qcFeedback(ok);
}
function qcNorm(s){return s.replace(/[（(][^）)]*[）)]/g,'').replace(/\s/g,'').trim();}
function submitFill(){
  if(qcAnswered)return;const inp=$('#qcin');if(!inp)return;const v=inp.value.trim();if(!v)return;
  qcAnswered=true;qcTotal++;
  const ok=v===qcAns.ans||qcNorm(v)===qcNorm(qcAns.ans);if(ok)qcScore++;markStudied();if(dailyReviewActive){markDailyAuto('review');dailyReviewActive=false;}
  inp.disabled=true;inp.style.borderColor=ok?'var(--green)':'var(--red)';inp.style.color=ok?'var(--green)':'var(--red)';
  qcFeedback(ok);
}

/* ===== 初始化 ===== */
history.replaceState({v:'home'},'');
renderDaily();renderFavs();renderCats();renderStat();renderChips();buildQueue();renderCard();renderLmode();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
